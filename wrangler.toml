# Template — the installer rewrites database_id automatically.
# For manual deploy: run `npx wrangler d1 create xraymod-db` and paste the id below.

name = "xraymod"
main = "worker/index.ts"
compatibility_date = "2024-11-01"
workers_dev = true
preview_urls = true

[assets]
directory = "./frontend/out"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "xraymod-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"
preview_database_id = "REPLACE_WITH_YOUR_D1_ID"

[vars]
ENABLE_TELEGRAM = "false"
ENABLE_TON_WALLET = "false"
EXTERNAL_SERVER_URL = ""
DISGUISE_PAGE = "1101"
PANEL_RECOVERY = "false"
TG_BOT_TOKEN = ""
CRYPTO_KEY = ""
