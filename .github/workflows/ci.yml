name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Typecheck worker (if tsconfig present)
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || true
          fi

      - name: Frontend install & build
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
            npm run build --if-present
          fi

      - name: Smoke scripts
        run: |
          if [ -f scripts/smoke-test.mjs ]; then node scripts/smoke-test.mjs || true; fi
          if [ -f test-offline.sh ]; then bash test-offline.sh || true; fi

  installer-syntax:
    name: Installer syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck install.sh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x install.sh || true
